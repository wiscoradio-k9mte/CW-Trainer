appId: io.github.wiscoradio_k9mte.CWTrainer
productName: Wisco Radio CW Trainer
copyright: Copyright © 2026 Travis Engh (K9MTE)

directories:
  output: release
  buildResources: build

# Only the bundled renderer (dist/) and the Electron main process ship inside
# the app. Vite has already bundled React and all source, so node_modules is
# not needed at runtime.
files:
  - dist/**/*
  - electron/**/*
  - package.json

linux:
  category: Education
  # No-space slug for the unpacked binary, so the binary, snap name, and launch
  # command all read "wr-cw-trainer" (productName "Wisco Radio CW Trainer" would
  # otherwise put spaces in the executable path). "wr-" = Wisco Radio.
  executableName: wr-cw-trainer
  # Keep synopsis under ~78 chars — the Snap store enforces a short summary.
  synopsis: Learn Morse code (CW) the Koch way, with copy practice and a QSO sim
  description: |
    WISCO RADIO CW Trainer — learn Morse code (CW) the way hams actually use it, from your first two characters to a full on-air contact. Fully offline. No account, no network, no ads.

    • Koch-method lessons — every character at full speed from lesson one, with Farnsworth spacing; a new character unlocks at 90% accuracy.
    • A six-rung copy ladder — single characters, pairs, random groups, ham words, callsigns, and full QSO phrases.
    • Sending practice with a built-in iambic paddle and straight-key decoder that shows exactly what your fist sends — including the HH "start over" prosign. Key on screen, with the keyboard, or with your own paddle or straight key through a USB adapter (VBand-compatible — the [ and ] keys).
    • A QSO simulator with POTA, SOTA, IOTA, and ragchew contacts — on-air break-in fills, honest signal reports, and a 5-second "get ready" countdown before the code starts.
    • Realistic band conditions — selectable receiver filtering (wide / CW 500 Hz / APF), QSB fading, and AGC.
    • Reference guides on CW lingo, on-air procedure, and the history of the code.

    Made in the Driftless by Wisco Radio (K9MTE). GPL-3.0 · open source · fully offline.
  desktop:
    entry:
      Name: Wisco Radio CW Trainer
      GenericName: Morse Code Trainer
      Comment: Learn Morse code the Koch way
      Categories: Education;HamRadio;
      Keywords: morse;cw;ham;radio;koch;telegraph;amateur;qso;pota;sota;
  target:
    # snap is built with real snapcraft (snap/snapcraft.yaml), NOT electron-builder
    # — its legacy template targets a 2018 platform that segfaults Electron 42.
    - flatpak

# electron-builder 26 logs a deprecation suggesting a `snapcraft:` key, but that
# key is not yet accepted by 26.15.5's config schema, so the legacy `snap:` key is
# correct. This build uses the template path (mksquashfs, no snapcraft/LXD needed);
# the snap-template extraction bug it used to hit is patched in app-builder-lib —
# see SNAP-BUILD-NOTES.md at the project root for the full story and the patch.
snap:
  grade: stable
  confinement: strict
  summary: Learn Morse code (CW) the Koch way, with copy practice and a QSO sim
  # Interfaces this app needs: a display, audio output, and graphics. These are
  # the standard electron-builder Snap defaults, minus "network" — the trainer
  # is fully offline. (Snapcraft has no "default" interface; the list must be
  # explicit real interface names.)
  plugs:
    - desktop
    - desktop-legacy
    - home
    - x11
    - wayland
    - unity7
    - browser-support
    - gsettings
    - audio-playback
    - pulseaudio
    - opengl

flatpak:
  # The freedesktop runtime + the shared Electron base app, bumped together.
  # IMPORTANT: Flathub rejects end-of-life runtimes. 25.08 is the current
  # freedesktop runtime (verified June 2026, when 24.08 reached end of life);
  # the SDK rolls a new version each August, so re-check https://docs.flathub.org
  # before a future release and raise both of these together (install the
  # matching runtimes — see README). No --share=network: the app is fully offline.
  runtimeVersion: "25.08"
  baseVersion: "25.08"
  finishArgs:
    - --share=ipc
    - --socket=wayland
    - --socket=fallback-x11
    - --socket=pulseaudio
    - --device=dri
