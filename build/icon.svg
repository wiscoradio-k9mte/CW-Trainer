<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#1F242B"/>
      <stop offset="100%" stop-color="#0E1013"/>
    </radialGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD89B"/>
      <stop offset="100%" stop-color="#F2A93B"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect x="6" y="6" width="500" height="500" rx="106" fill="none" stroke="#6B5837" stroke-width="4" opacity="0.6"/>

  <!-- W R in Morse:  ·−−   ·−·  -->
  <g fill="url(#amber)">
    <!-- W : dit dah dah -->
    <circle cx="150" cy="196" r="26"/>
    <rect x="190" y="170" width="118" height="52" rx="26"/>
    <rect x="326" y="170" width="118" height="52" rx="26"/>
  </g>
  <g fill="url(#amber)" transform="translate(0,118)">
    <!-- R : dit dah dit -->
    <circle cx="150" cy="196" r="26"/>
    <rect x="190" y="170" width="118" height="52" rx="26"/>
    <circle cx="346" cy="196" r="26"/>
  </g>

  <text x="256" y="430" text-anchor="middle"
        font-family="ui-monospace, 'DejaVu Sans Mono', monospace"
        font-size="86" font-weight="700" letter-spacing="14" fill="url(#amber)">CW</text>
</svg>
