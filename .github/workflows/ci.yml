# CI — PR checks for CW Trainer
#
# Runs on every pull request and every push to main.
# These jobs become the *required status checks* for the main branch.
# (Set them in Settings → Branches → branch protection rules once the
# workflow has run at least once so GitHub surfaces the job names.)
#
# Scope: test + build only. CodeQL, Dependabot, dependency-review, and
# secret scanning are owned by the security-engineer and live in separate
# workflows — do not add them here.
#
# ARCHITECTURE MATRIX (added 2026-07-02, ARM desktop-build work):
# Runs the full suite natively on BOTH amd64 (ubuntu-latest) and arm64
# (ubuntu-24.04-arm). This is deliberately on EVERY PR and push to main, not
# merge-only: the point of shipping arm64 is proving compatibility BEFORE
# code lands on main, and GitHub's standard arm64 runner is free/unlimited on
# this public repo (verified — see docs/design-arm64-builds.md §1), so there
# is no cost reason to defer it. The two OS legs run in parallel, so PR
# latency is max(amd64, arm64), not the sum.
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel any in-flight run for the same ref so a quick follow-up push
# doesn't queue behind a slow one.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege token: we only read the repo.
permissions:
  contents: read

jobs:
  test-and-build:
    name: Test & Build (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
          - os: ubuntu-24.04-arm
            arch: arm64

    steps:
      - name: Checkout
        # actions/checkout v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Node 22
        # actions/setup-node v7.0.0
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        # npm ci is the lockfile-respecting install — never npm install in CI.
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build renderer
        # vite build — confirms the production bundle compiles cleanly.
        # The snap build (electron-builder --dir + snapcraft) is only done
        # on the release workflows; it requires a heavier build environment.
        run: npm run build
