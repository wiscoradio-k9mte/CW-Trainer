# CI — PR checks for CW Trainer
#
# Runs on every pull request and every push to main.
# These jobs become the *required status checks* for the main branch.
# (Set them in Settings → Branches → branch protection rules once the
# workflow has run at least once so GitHub surfaces the job names.)
#
# Scope: test + build only. CodeQL, Dependabot, dependency-review, and
# secret scanning are owned by the security-engineer and live in separate
# workflows — do not add them here.

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel any in-flight run for the same ref so a quick follow-up push
# doesn't queue behind a slow one.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege token: we only read the repo.
permissions:
  contents: read

jobs:
  test-and-build:
    name: Test & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        # actions/checkout v4.3.1
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Node 22
        # actions/setup-node v4.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        # npm ci is the lockfile-respecting install — never npm install in CI.
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build renderer
        # vite build — confirms the production bundle compiles cleanly.
        # The snap build (electron-builder --dir + snapcraft) is only done
        # on the release workflow; it requires a heavier build environment.
        run: npm run build
