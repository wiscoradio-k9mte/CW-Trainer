# Release — CW Trainer
#
# Trigger: a pushed tag matching v*.*.* (e.g. v2.0.0).
# Travis pushes the tag manually after confirming the build is ready.
# Automation builds, tests, packages, creates the GitHub Release, and
# uploads the snap revision to the Snap Store.
#
# AUTO-PUBLISH ON TAG (model changed 2026-06-26, per Travis):
# The DELIBERATE version tag that triggers this workflow IS the human's publish
# authorization. The full test suite + build run first; only if they pass does the
# snap upload-and-release to `stable`. So a broken build can never go live, and Travis
# does not need to be present for the promotion step. The human checkpoint moved from
# "manually promote each release" to "deliberately tag the release"; the automation
# carries it out, gated by the tests.
#
# WHY auto-promote on tag (vs a GitHub Environment approval gate):
# An Environment gate holds the runner live waiting for a click (times out at 6h) and
# requires the human to be available at publish time — the exact thing this avoids.
# The tag is a one-line deliberate act Travis can do from anywhere. See RELEASING.md.
#
# SNAP BUILD IN CI:
# We use snapcore/action-build, which provisions LXD on the runner and invokes
# real snapcraft inside an LXD container — the same toolchain that produced
# the live v1.0.x snaps. This is the correct path for a core22 + gnome-extension
# snap. electron-builder's snap target is explicitly NOT used (see CLAUDE.md —
# it segfaults Electron 42 against the gnome-3-28-1804 runtime).
#
# The snapcraft.yaml `dump` plugin references `release/linux-unpacked`, which
# `npm run pack` (electron-builder --dir) produces. So the build order is:
#   1. npm ci
#   2. npm test
#   3. npm run build        (vite build → dist/)
#   4. npm run pack         (electron-builder --dir → release/linux-unpacked/)
#   5. snapcore/action-build (snapcraft → wr-cw-trainer_*.snap)
#
# ARCHITECTURE MATRIX (added 2026-07-02, ARM desktop-build work):
# Every tag BUILDS amd64 (ubuntu-latest) AND arm64 (ubuntu-24.04-arm)
# NATIVELY, one leg per arch — no qemu cross-build. Both arch snaps are
# attached to the GitHub Release. See docs/design-arm64-builds.md for the
# researched rationale and sources.
#
# PUBLISHING, however, is amd64-only (see Job 3). This tag path publishes to
# `stable` and NEVER touches `edge` — edge is populated only by a manual
# workflow_dispatch of release-edge.yml, which additionally rejects bare X.Y.Z
# versions, so a plain `2.4.0` can never land on edge. Consequence: on arm64
# THIS EXACT VERSION is reachable only as a GitHub Release asset installed with
# `--dangerous`.
#
# Careful with that sentence: it is scoped to this version, NOT to the arm64
# build in general. arm64 snaps DO reach the `edge` channel — release-edge.yml's
# upload-edge job is matrixed [amd64, arm64] with --release=edge — they just
# carry a `X.Y.Z-edge.N` version, never a plain `X.Y.Z`. So "arm64 is on no
# channel" is FALSE and dangerously so (it hides that `--edge` will install a
# pre-release build possibly OLDER than stable). State the version scope.
#
# arm64 stays off `stable` until Travis validates it on real ARM hardware —
# arm64 `stable` is intentionally empty. Both
# arches DO ship under one version string when arm64 is eventually enabled; the
# Snap Store's channel map is per (channel, architecture), so that's collision-free.
#
# SECRETS REQUIRED (see RELEASING.md for how to obtain and set each):
#   SNAPCRAFT_STORE_CREDENTIALS  — snapcraft export-login output (base64 macaroon)
#   MAIL_SERVER                  — SMTP host for escalation emails
#   MAIL_PORT                    — SMTP port (465 for TLS)
#   MAIL_USERNAME                — sender address / SMTP username
#   MAIL_PASSWORD                — Gmail App Password

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

# No cancel-in-progress for releases — a running release should not be
# interrupted by a duplicate tag push (which should never happen anyway).
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# Default to no permissions; each job declares only what it needs.
permissions: {}

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # Job 1: Build, test, and package the snap — natively, once per architecture.
  # ──────────────────────────────────────────────────────────────────────
  build-and-package:
    name: Build, Test & Package Snap (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    permissions:
      contents: read   # checkout only
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
          - os: ubuntu-24.04-arm
            arch: arm64

    steps:
      - name: Checkout
        # actions/checkout v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Node 22
        # actions/setup-node v6.4.0
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: '22'
          cache: 'npm'

      - name: Extract version from tag
        id: get-version
        # Strip the leading 'v' from the tag name so we get '2.0.0' not 'v2.0.0'.
        # GITHUB_REF_NAME is an auto-exposed environment variable, not a
        # user-supplied workflow_dispatch input, so no additional hardening
        # is needed here (only push-access holders can create tags). ARCH is
        # passed via env: (not inline ${{ }}) for consistency with the
        # env-block hardening pattern used elsewhere in this change.
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building version ${VERSION} for ${ARCH}"

      - name: Validate version matches package.json
        # Fail fast if the tag and package.json are out of sync — prevents
        # a release with the wrong version baked into the binary. Runs on
        # both arch legs; cheap and idempotent.
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${{ steps.get-version.outputs.version }}"
          if [ "${PKG_VERSION}" != "${TAG_VERSION}" ]; then
            echo "ERROR: package.json version (${PKG_VERSION}) does not match tag (${TAG_VERSION})"
            echo "Bump package.json and snapcraft.yaml to ${TAG_VERSION} before tagging."
            exit 1
          fi
          echo "Version check passed: ${PKG_VERSION}"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        # Runs natively on both amd64 and arm64 via the matrix above.
        run: npm test

      - name: Build renderer (Vite)
        run: npm run build

      - name: Build Electron unpacked tree
        # electron-builder --dir produces release/linux-unpacked/, arch-matched
        # to the runner (npm run pack = --x64 on ubuntu-latest; pack:arm64 =
        # --arm64 on ubuntu-24.04-arm). This is the source directory that the
        # snapcraft.yaml `dump` plugin uses.
        run: ${{ matrix.arch == 'arm64' && 'npm run pack:arm64' || 'npm run pack' }}

      - name: Build snap (snapcore/action-build v1.3.0)
        # snapcore/action-build v1.3.0
        # On the arm64 runner this builds a native arm64 LXD container;
        # snapcraft auto-selects the matching build-on:[arm64] entry in
        # snapcraft.yaml (see docs/design-arm64-builds.md).
        uses: snapcore/action-build@3bdaa03e1ba6bf59a65f84a751d943d549a54e79
        id: snapcraft
        with:
          snapcraft-channel: stable

      - name: Locate snap artifact
        id: find-snap
        # snapcore/action-build outputs the snap path in steps.snapcraft.outputs.snap,
        # but we also verify it exists before proceeding.
        run: |
          SNAP_PATH="${{ steps.snapcraft.outputs.snap }}"
          if [ ! -f "${SNAP_PATH}" ]; then
            echo "ERROR: snap artifact not found at ${SNAP_PATH}"
            exit 1
          fi
          echo "snap-path=${SNAP_PATH}" >> "$GITHUB_OUTPUT"
          echo "Snap built at: ${SNAP_PATH}"
          ls -lh "${SNAP_PATH}"

      - name: Upload snap artifact (for the release job)
        # Stash the snap so the release job can download it without rebuilding.
        # One artifact per arch (name suffixed with matrix.arch).
        # actions/upload-artifact v7.0.1
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: snap-artifact-${{ matrix.arch }}
          path: ${{ steps.find-snap.outputs.snap-path }}
          retention-days: 7
          if-no-files-found: error

  # ──────────────────────────────────────────────────────────────────────
  # Job 2: Create ONE GitHub Release carrying both arch snaps as assets.
  #
  # Runs only after build-and-package succeeds for BOTH arches (the test gate).
  # ──────────────────────────────────────────────────────────────────────
  create-github-release:
    name: Create GitHub Release
    needs: build-and-package
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write   # create GitHub Release and upload release assets

    steps:
      - name: Checkout (for release notes)
        # actions/checkout v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Download amd64 snap artifact
        # actions/download-artifact v8.0.1
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: snap-artifact-amd64
          path: ./dist-snap

      - name: Download arm64 snap artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: snap-artifact-arm64
          path: ./dist-snap

      - name: Extract version from tag
        id: get-version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Extract release notes from metainfo.xml
        id: release-notes
        # Pull the description for the current version from the AppStream metainfo
        # file so store notes and GitHub Release notes stay in sync.
        # Falls back to a minimal "CW Trainer vX.Y.Z" line if absent.
        run: |
          python3 .github/scripts/extract_release_notes.py > /tmp/release_notes.txt
          {
            echo "notes<<NOTES_EOF"
            cat /tmp/release_notes.txt
            echo "NOTES_EOF"
          } >> "$GITHUB_OUTPUT"
        env:
          VERSION: ${{ steps.get-version.outputs.version }}
          GITHUB_WORKSPACE: ${{ github.workspace }}

      - name: Create GitHub Release
        id: gh-release
        # WORDING WARNING — do not "tighten" the arm64 sentence below.
        # It says arm64 "is not AUTOMATICALLY published to any channel". That
        # adverb is load-bearing and deliberate: this tag workflow publishes
        # arm64 nowhere, but release-edge.yml's upload-edge job IS matrixed
        # [amd64, arm64] with --release=edge, so arm64 snaps DO reach the edge
        # channel during feature testing. Dropping "automatically" turns a true
        # statement into a false one — and false in the dangerous direction,
        # because it tells an arm64 user nothing is on any channel while
        # `--edge` will happily install a pre-release build that may be OLDER
        # than current stable. (Exactly this shipped in the README and was
        # caught by the brand-truth gate, 2026-07-20.) Deny nothing here;
        # state what this workflow does and let the README carry the warning.
        # softprops/action-gh-release v3.0.1
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228
        with:
          tag_name: ${{ github.ref_name }}
          name: 'CW Trainer v${{ steps.get-version.outputs.version }}'
          body: |
            ${{ steps.release-notes.outputs.notes }}

            ---
            **Install from the Snap Store (amd64 / x86-64):**
            ```
            sudo snap install wr-cw-trainer
            ```

            **ARM64 (aarch64):** this release is **not** published to the `stable` channel for
            arm64 — arm64 stable is intentionally empty, because the build has not yet been
            validated on real ARM hardware. `snap install wr-cw-trainer` will not install on arm64.

            To run ${{ steps.get-version.outputs.version }} on arm64, download
            `wr-cw-trainer_${{ steps.get-version.outputs.version }}_arm64.snap` from the assets below:
            ```
            sudo snap install --dangerous wr-cw-trainer_${{ steps.get-version.outputs.version }}_arm64.snap
            ```
            A `--dangerous` install isn't tracked by a channel, so it won't auto-update — you'll
            need to repeat this each release.

            The arm64 build is built and tested natively in CI on every release, but is not
            automatically published to any channel. Reports from real ARM hardware are very
            welcome via the issue tracker — that's what will get arm64 onto stable.
          files: ./dist-snap/*.snap
          draft: false
          prerelease: false
          generate_release_notes: false

  # ──────────────────────────────────────────────────────────────────────
  # Job 3: Upload the amd64 snap revision and release it to `stable`.
  #
  # The deliberate version tag is the human's publish authorization; a failed
  # build (EITHER arch) never reaches here.
  #
  # AMD64-ONLY ON STABLE (2026-07-20, Travis's standing constraint):
  # arm64 is deliberately EXCLUDED from this matrix. The arm64 leg is still
  # built, fully tested natively in CI, and attached to the GitHub Release
  # above — but it is published to NO channel by this workflow. (It does not go
  # to edge either: edge comes only from a manual release-edge.yml dispatch,
  # which rejects bare X.Y.Z versions.) So on arm64 a tagged release is
  # installable only from the GitHub Release asset via `--dangerous`. That's
  # because the arm64 build has never been validated on real ARM hardware
  # (Travis has no ARM box); arm64 `stable` is intentionally empty. Lifting this
  # is TRAVIS'S CALL ONLY — do not add arm64 back to this matrix without his go.
  # When he does lift it, restore `arch: [amd64, arm64]` here; nothing else
  # needs to change (the Store's channel map already tracks revisions per
  # (channel, architecture), so the two coexist collision-free).
  # ──────────────────────────────────────────────────────────────────────
  upload-to-stable:
    name: Upload Snap Revision to Stable (${{ matrix.arch }})
    needs: create-github-release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions: {}
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64]

    steps:
      - name: Download snap artifact
        # actions/download-artifact v8.0.1
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: snap-artifact-${{ matrix.arch }}
          path: ./dist-snap

      - name: Locate downloaded snap
        id: snap-loc
        run: |
          SNAP_FILE=$(ls ./dist-snap/*.snap | head -1)
          echo "snap-file=${SNAP_FILE}" >> "$GITHUB_OUTPUT"
          echo "Snap file: ${SNAP_FILE}"
          ls -lh "${SNAP_FILE}"

      - name: Install snapcraft
        run: |
          sudo snap install snapcraft --classic

      - name: Upload snap revision and release to stable (auto-publish on tag)
        # Uploads this arch's snap revision and releases it to the `stable`
        # channel. The human's authorization is the DELIBERATE version tag
        # that triggered this workflow; the full test gate above must pass
        # (for BOTH arches) before this step runs, so a broken build can never
        # reach stable. Each arch becomes its own revision; the Store's
        # channel map tracks revisions per (channel, architecture), so amd64
        # and arm64 coexist under the same version with no collision (see
        # docs/design-arm64-builds.md §4).
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
          SNAP_FILE: ${{ steps.snap-loc.outputs.snap-file }}
          ARCH: ${{ matrix.arch }}
        run: |
          echo "Uploading ${SNAP_FILE} (${ARCH}) and releasing to the stable channel..."
          # Retry the upload: the Snap Store connection can drop mid-transfer
          # (RemoteDisconnected) — a transient network failure that clears on retry.
          # Don't fail a built-and-tested release (and fire a false escalation) over a
          # flaky upload; only surface a real failure after 3 attempts. (Added 2026-06-28
          # after a transient RemoteDisconnected failed a 2.2.1 upload that succeeded on retry.)
          for attempt in 1 2 3; do
            if snapcraft upload "${SNAP_FILE}" --release=stable; then
              echo "Upload succeeded on attempt ${attempt}."
              break
            fi
            if [ "${attempt}" = "3" ]; then
              echo "Upload failed after 3 attempts — surfacing as a real failure."
              exit 1
            fi
            echo "Upload attempt ${attempt} failed (likely transient); retrying in 30s..."
            sleep 30
          done
          echo ""
          echo "Upload complete (${ARCH}). The revision has been released to stable;"
          echo "it goes live once the store's automated review passes."

      - name: Push text metadata to Snap Store
        # Reads summary, description, and icon from the built snap and updates
        # the store listing. Does NOT affect screenshots or other dashboard media
        # (upload-metadata only touches the fields embedded in the snap itself).
        # The --force flag overrides any store-side metadata conflicts.
        # NON-FATAL: this runs AFTER the snap is already released to stable, so a
        # metadata-push hiccup (e.g. an oversized icon) must never fail the release.
        # Metadata is arch-independent, so running it from both matrix legs is a
        # harmless idempotent overwrite. Store metadata-icon limit is 256kB —
        # keep snap/local/icon.png under it.
        continue-on-error: true
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
          SNAP_FILE: ${{ steps.snap-loc.outputs.snap-file }}
        run: |
          snapcraft upload-metadata "${SNAP_FILE}" --force \
            && echo "Metadata (summary, description, icon) pushed to the Snap Store." \
            || echo "WARNING: metadata push failed (non-fatal — the snap is already released)."

  # ──────────────────────────────────────────────────────────────────────
  # Job 4: Email Travis if the release failed.
  # Only fires if one of the previous jobs failed — not on success.
  # ──────────────────────────────────────────────────────────────────────
  notify-on-failure:
    name: Notify on release failure
    needs: [build-and-package, create-github-release, upload-to-stable]
    if: failure()
    uses: ./.github/workflows/notify-escalation.yml
    with:
      subject: 'Release ${{ github.ref_name }} FAILED — action needed'
      severity: 'high'
      body: |
        The release workflow for tag ${{ github.ref_name }} failed.

        Check the run log for details:
        ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

        Common causes:
        - package.json / snapcraft.yaml version mismatch with the tag
        - snapcraft build failure on either arch (LXD setup or snapcraft.yaml
          error) — the arm64 leg is newer and less proven than the amd64 leg
        - SNAPCRAFT_STORE_CREDENTIALS expired (re-export and update the secret)
        - GitHub Release creation failure

        The snap was NOT uploaded to the store. No user-visible change occurred.
    secrets: inherit
